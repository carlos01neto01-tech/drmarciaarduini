<!doctype html>
<html lang="pt-br">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dra. Márcia Arduini</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@300;400&display=swap" rel="stylesheet">

<style>
:root{
  --paper:#E7E3DC;
  --ink:#3B4E57;
  --header-h:104px;
}

/* RESET */
*{box-sizing:border-box}
body{
  margin:0;
  font-family:"Source Sans 3", sans-serif;
  background:#fff;
}
img{max-width:100%;display:block}
a{text-decoration:none;color:inherit}

/* HEADER */
header{
  position:fixed;
  top:0;left:0;right:0;
  background:var(--paper);
  height:var(--header-h);
  display:flex;
  align-items:center;
  padding:0 40px;
  z-index:9999;
}

.logo img{height:64px}

.nav{
  flex:1;
  display:none;
  justify-content:center;
  gap:30px;
}

.nav a{
  font-size:16px;
}

.cta-top{
  display:none;
  background:var(--ink);
  color:#fff;
  padding:12px 22px;
  border-radius:12px;
}

/* HERO */
.hero{
  padding-top:var(--header-h);
  min-height:100vh;
  background:url("assets/FUNDO DESKTOP.webp") center/cover no-repeat;
  display:flex;
  align-items:center;
}

.container{
  width:1200px;
  max-width:95%;
  margin:auto;
  display:flex;
  align-items:center;
  justify-content:space-between;
}

.image-wrap{
  position:relative;
  width:45%;
}

.image-wrap::before{
  content:"";
  position:absolute;
  bottom:8%;
  left:50%;
  transform:translateX(-50%);
  width:80%;
  height:30%;
  background:radial-gradient(ellipse at center,
    rgba(0,0,0,.25),
    rgba(0,0,0,0));
  filter:blur(12px);
}

.doutora{
  position:relative;
  z-index:2;
}

.handle{
  position:absolute;
  left:50%;
  top:67%;  /* AJUSTE FINO DO @ */
  transform:translate(-50%,-50%);
  width:340px;
  z-index:3;
}

.text{
  width:45%;
}

.text h1{
  font-family:"Cormorant Garamond", serif;
  font-size:60px;
  line-height:1.05;
  text-transform:uppercase;
  margin:0;
}

.text p{
  margin:25px 0 45px 0; /* RESPIRO MAIOR AQUI */
  font-size:20px;
  color:#555;
}

.cta{
  display:inline-block;
  background:var(--ink);
  color:#fff;
  padding:18px 36px;
  border-radius:18px;
  font-size:20px;
}

/* RESPONSIVO */
@media(max-width:1024px){

  .hero{
    background:url("assets/FUNDO MOBILE.webp") center/cover no-repeat;
  }

  .container{
    flex-direction:column;
    text-align:left;
  }

  .image-wrap, .text{
    width:100%;
  }

  .text{
    margin-top:20px;
  }

  .text h1{
    font-size:42px;
  }

  .handle{
    top:63%;
    width:300px;
  }
}

/* DESKTOP MENU */
@media(min-width:1024px){
  .nav{display:flex}
  .cta-top{display:inline-block}
}
</style>
</head>

<body>

<header>
  <div class="logo">
    <img src="assets/LOGO.svg">
  </div>

  <nav class="nav">
    <a href="#">Início</a>
    <a href="#">Quem sou</a>
    <a href="#">Procedimentos</a>
    <a href="#">Contato</a>
  </nav>

  <a href="#" class="cta-top">Agendar</a>
</header>

<section class="hero">
  <div class="container">

    <div class="image-wrap">
      <img src="assets/DOUTORA MOBILE.webp" class="doutora">
      <img src="assets/@dramarcia.arduini.svg" class="handle">
    </div>

    <div class="text">
      <h1>
        PRECISÃO<br>
        TÉCNICA.<br>
        SENSIBILIDADE<br>
        ESTÉTICA.
      </h1>

      <p>
        Harmonização facial e estética avançada com foco em naturalidade, segurança 
        planejamento individual.
      </p>

      <a href="#" class="cta">Quero agendar</a>
    </div>

  </div>
</section>

</body>
</html>
