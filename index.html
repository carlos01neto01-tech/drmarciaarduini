<!doctype html>
<html lang="pt-br">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dra. Márcia Arduini</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@300;400&display=swap" rel="stylesheet">

<style>
:root{
  --paper:#E7E3DC;
  --ink:#3B4E57;
  --header-h:104px;

  --handle-desktop:66%;
  --handle-mobile:62%;

  --space-btn:58px;
}

*{box-sizing:border-box}
body{
  margin:0;
  font-family:"Source Sans 3", sans-serif;
  background:#fff;
}
img{max-width:100%;display:block}
a{text-decoration:none;color:inherit}

/* HEADER */
header{
  position:fixed;
  top:0;left:0;right:0;
  height:var(--header-h);
  background:var(--paper);
  display:flex;
  align-items:center;
  padding:0 20px;
  z-index:9999;
  border-bottom:1px solid rgba(0,0,0,.08);
}
.logo img{height:64px}

.nav-desktop{
  display:none;
  flex:1;
  justify-content:center;
  gap:28px;
}
.nav-desktop a{font-size:16px}

.cta-top{
  display:none;
  background:var(--ink);
  color:#fff;
  padding:12px 18px;
  border-radius:12px;
}

.menuBtn{
  margin-left:auto;
  width:56px;height:56px;
  border-radius:18px;
  border:1px solid rgba(0,0,0,.10);
  background:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
}

.nav-mobile{
  position:fixed;
  top:calc(var(--header-h) - 6px);
  right:18px;
  width:300px;
  background:#fff;
  border-radius:20px;
  padding:14px;
  box-shadow:0 20px 50px rgba(0,0,0,.15);
  opacity:0;
  pointer-events:none;
  transform:translateY(-10px);
  transition:.2s;
}
.nav-mobile.open{
  opacity:1;
  pointer-events:auto;
  transform:translateY(0);
}
.nav-mobile a{
  display:block;
  padding:14px;
  font-size:18px;
}
.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.2);
  opacity:0;
  pointer-events:none;
}
.overlay.show{
  opacity:1;
  pointer-events:auto;
}

/* HERO */
.hero{
  padding-top:var(--header-h);
  min-height:100vh;
  background:url("assets/FUNDO MOBILE.webp") center/cover no-repeat;
  display:flex;
  align-items:center;
}

.container{
  width:1200px;
  max-width:95%;
  margin:auto;
  display:flex;
  flex-direction:column;
  gap:30px;
}

/* MOBILE */
.image-wrap{
  position:relative;
  width:100%;
  max-width:420px;
  margin:auto;
}
.image-wrap::before{
  content:"";
  position:absolute;
  bottom:10%;
  left:50%;
  transform:translateX(-50%);
  width:85%;
  height:30%;
  background:radial-gradient(ellipse at center, rgba(0,0,0,.25), transparent);
  filter:blur(12px);
  z-index:1;
}
.doutora{position:relative;z-index:2}
.handle{
  position:absolute;
  left:50%;
  top:var(--handle-mobile);
  transform:translate(-50%,-50%);
  width:300px;
  z-index:3;
}

.text{
  width:100%;
}
.text h1{
  font-family:"Cormorant Garamond", serif;
  font-size:42px;
  line-height:1.05;
  text-transform:uppercase;
  margin:0;
}
.text p{
  margin:24px 0 var(--space-btn);
  font-size:18px;
  color:#555;
}
.cta{
  display:flex;
  align-items:center;
  justify-content:center;
  height:64px;
  background:var(--ink);
  color:#fff;
  border-radius:18px;
  font-size:20px;
}

/* DESKTOP */
@media(min-width:1024px){

  .hero{
    background:url("assets/FUNDO DESKTOP.webp") center/cover no-repeat;
  }

  .container{
    flex-direction:row;
    align-items:center;
    justify-content:space-between;
  }

  .text{
    width:48%;
  }

  .image-wrap{
    width:42%;
    margin:0;
  }

  .handle{
    top:var(--handle-desktop);
    width:360px;
  }

  .nav-desktop{display:flex}
  .cta-top{display:inline-block}
  .menuBtn{display:none}
  .nav-mobile{display:none}
  .overlay{display:none}
}
</style>
</head>

<body>

<header>
  <div class="logo">
    <img src="assets/LOGO.svg">
  </div>

  <nav class="nav-desktop">
    <a href="#">Início</a>
    <a href="#">Quem sou</a>
    <a href="#">Procedimentos</a>
    <a href="#">Contato</a>
  </nav>

  <a href="#" class="cta-top">Agendar</a>

  <button class="menuBtn" id="menuBtn">
    <img src="assets/CLICAVEL.svg">
  </button>
</header>

<nav class="nav-mobile" id="navMobile">
  <a href="#">Início</a>
  <a href="#">Quem sou</a>
  <a href="#">Procedimentos</a>
  <a href="#">Contato</a>
</nav>
<div class="overlay" id="overlay"></div>

<section class="hero">
  <div class="container">

    <!-- MOBILE: FOTO EM CIMA -->
    <div class="image-wrap">
      <img src="assets/DOUTORA MOBILE.webp" class="doutora">
      <img src="assets/@dramarcia.arduini.svg" class="handle">
    </div>

    <!-- TEXTO -->
    <div class="text">
      <h1>
        PRECISÃO<br>
        TÉCNICA.<br>
        SENSIBILIDADE<br>
        ESTÉTICA.
      </h1>

      <p>
        Harmonização facial e estética avançada
        com foco em naturalidade, segurança e
        planejamento individual.
      </p>

      <a href="#" class="cta">Quero agendar</a>
    </div>

  </div>
</section>

<script>
const btn=document.getElementById("menuBtn");
const nav=document.getElementById("navMobile");
const overlay=document.getElementById("overlay");

btn.addEventListener("click",()=>{
  nav.classList.toggle("open");
  overlay.classList.toggle("show");
});
overlay.addEventListener("click",()=>{
  nav.classList.remove("open");
  overlay.classList.remove("show");
});
</script>

</body>
</html>
