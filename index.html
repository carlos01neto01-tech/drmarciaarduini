<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dra. Márcia Arduini</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@300;400&display=swap" rel="stylesheet">

  <style>
    :root{
      --paper:#E7E3DC;
      --ink:#3B4E57;
      --container:1200px;
      --header-h:104px;

      /* @ MAIS PRA CIMA */
      --handle-bottom-mobile: 9%;
      --handle-bottom-desktop: 10%;

      /* respiro subtítulo -> botão */
      --sub-to-btn: 56px;
    }

    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family:"Source Sans 3", system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background:#fff;
      overflow-x:hidden;
    }
    img{max-width:100%;display:block}
    a{text-decoration:none;color:inherit}
    button{font:inherit}

    /* ================= HEADER ================= */
    header{
      position:fixed;
      top:0; left:0; right:0;
      height:var(--header-h);
      background:var(--paper);     /* sem transparência, sem azul */
      z-index:9999;
      border-bottom:none;          /* remove linha de baixo */
      box-shadow:none;             /* remove “faixa” */
    }

    .header-inner{
      max-width:var(--container);
      height:100%;
      margin:0 auto;
      padding:0 18px;
      display:flex;
      align-items:center;
      gap:14px;
    }

    .logo img{
      height:64px;
      width:auto;
    }

    /* desktop nav */
    .nav-desktop{
      display:none;
      flex:1;
      justify-content:center;
      gap:26px;
      align-items:center;
    }
    .nav-desktop a{
      font-size:16px;
      padding:10px 12px;
      border-radius:12px;
    }
    .nav-desktop a:hover{background:rgba(0,0,0,.05)}

    /* CTA header: só desktop */
    .cta-top{
      display:none; /* mobile não mostra */
      height:46px;
      padding:0 18px;
      border-radius:14px;
      background:var(--ink);
      color:#fff;
      align-items:center;
      justify-content:center;
      font-size:16px;
      position:relative;
      overflow:hidden;
      box-shadow:0 12px 22px rgba(0,0,0,.16);
    }
    .cta-top::before{
      content:"";
      position:absolute;
      inset:-2px;
      background:linear-gradient(135deg,
        rgba(255,255,255,.14),
        rgba(255,255,255,0) 35%,
        rgba(255,255,255,.10) 70%,
        rgba(255,255,255,0)
      );
      opacity:.22;
      pointer-events:none;
    }
    .cta-top::after{
      content:"";
      position:absolute;
      top:-40%;
      left:-70%;
      width:55%;
      height:180%;
      background:linear-gradient(90deg,transparent,rgba(255,255,255,.42),transparent);
      transform:skewX(-20deg);
      opacity:0;
      pointer-events:none;
    }
    .cta-top:hover::after{opacity:1;animation:sweep 1.1s ease-in-out}
    @keyframes sweep{0%{left:-70%}100%{left:140%}}

    /* botão mobile menu */
    .menuBtn{
      margin-left:auto;
      width:56px;height:56px;
      border-radius:18px;
      border:1px solid rgba(0,0,0,.10);
      background:rgba(255,255,255,.45);
      display:flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      -webkit-tap-highlight-color:transparent;
    }
    .menuBtn img{width:26px;height:26px}

    /* dropdown mobile */
    .nav-mobile{
      position:fixed;
      top:calc(var(--header-h) - 6px);
      right:18px;
      width:min(360px, calc(100vw - 36px));
      background:rgba(255,255,255,.96);
      backdrop-filter:blur(12px);
      border:1px solid rgba(0,0,0,.10);
      border-radius:20px;
      padding:14px;
      box-shadow:0 20px 50px rgba(0,0,0,.15);
      opacity:0;
      transform:translateY(-10px);
      pointer-events:none;
      transition:.2s ease;
      z-index:9999;
    }
    .nav-mobile.open{opacity:1;transform:translateY(0);pointer-events:auto}
    .nav-mobile a{
      display:block;
      padding:14px 16px;
      font-size:18px;
      border-radius:14px;
    }
    .nav-mobile a:active{background:rgba(0,0,0,.05)}
    .nav-mobile .wa{
      margin-top:10px;
      background:var(--ink);
      color:#fff;
      text-align:center;
      border-radius:16px;
      padding:16px;
      font-size:18px;
      box-shadow:0 12px 22px rgba(0,0,0,.14);
    }

    .overlay{
      position:fixed; inset:0;
      background:rgba(0,0,0,.20);
      opacity:0;
      pointer-events:none;
      transition:.2s ease;
      z-index:9998;
    }
    .overlay.show{opacity:1;pointer-events:auto}

    /* ================= HERO ================= */
    .hero{
      padding-top:var(--header-h);
      min-height:100svh;
      background:url("assets/FUNDO%20MOBILE.webp") center/cover no-repeat;
      display:flex;
      align-items:flex-start;
    }

    /* IMPORTANTE: grid areas garantem foto em cima / texto embaixo */
    .hero-wrap{
      max-width:var(--container);
      width:100%;
      margin:0 auto;
      padding:22px 18px 56px;
      display:grid;
      grid-template-areas:
        "media"
        "text";
      gap:14px;
    }

    .media{grid-area:media}
    .text{grid-area:text}

    .media{
      position:relative;
      width:min(420px, 100%);
      margin:0 auto;
    }

    /* sombra/base */
    .media::before{
      content:"";
      position:absolute;
      left:50%;
      bottom:10%;
      transform:translateX(-50%);
      width:86%;
      height:28%;
      background:radial-gradient(ellipse at center, rgba(0,0,0,.22), rgba(0,0,0,0) 70%);
      filter:blur(12px);
      z-index:1;
      pointer-events:none;
    }

    .doutora{
      position:relative;
      z-index:2;
      width:100%;
      filter:drop-shadow(0 20px 30px rgba(0,0,0,.22));
    }

    /* @ CENTRALIZADO e preso na foto */
    .handle{
      position:absolute;
      left:50%;
      transform:translateX(-50%);
      bottom:var(--handle-bottom-mobile); /* mais pra cima */
      width:min(320px, 86vw);
      z-index:3;
      filter:drop-shadow(0 15px 25px rgba(0,0,0,.22));
      pointer-events:none;
    }

    .text{
      max-width:560px;
    }

    .title{
      font-family:"Cormorant Garamond", serif;
      font-size:40px;
      line-height:1.05;
      text-transform:uppercase;
      margin:0;
      text-align:left;
    }

    .subtitle{
      margin:22px 0 var(--sub-to-btn);
      font-size:28px;
      line-height:1.7;
      color:rgba(0,0,0,.65);
      text-align:left;
    }

    /* BOTÃO preenchido (não fica “só linha”) */
    .cta{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      height:64px;
      padding:0 28px;
      border-radius:18px;
      background:var(--ink);
      color:#fff;
      font-size:20px;
      border:none;
      box-shadow:0 12px 25px rgba(0,0,0,.18);
      position:relative;
      overflow:hidden;
      transition:transform .18s ease, box-shadow .18s ease, filter .18s ease;
    }

    .cta::before{
      content:"";
      position:absolute;
      inset:-2px;
      background:linear-gradient(135deg,
        rgba(255,255,255,.14),
        rgba(255,255,255,0) 35%,
        rgba(255,255,255,.10) 70%,
        rgba(255,255,255,0)
      );
      opacity:.22;
      pointer-events:none;
    }
    .cta::after{
      content:"";
      position:absolute;
      top:-40%;
      left:-70%;
      width:55%;
      height:180%;
      background:linear-gradient(90deg,transparent,rgba(255,255,255,.42),transparent);
      transform:skewX(-20deg);
      opacity:0;
      pointer-events:none;
    }
    .cta:hover{
      transform:translateY(-2px);
      box-shadow:0 16px 30px rgba(0,0,0,.18);
      filter:brightness(1.02);
    }
    .cta:hover::after{opacity:1;animation:sweep2 1.2s ease-in-out}
    @keyframes sweep2{0%{left:-70%}100%{left:140%}}

    /* fade in blur */
    .reveal{
      opacity:0;
      filter:blur(10px);
      transform:translateY(14px);
      transition:opacity .65s ease, filter .65s ease, transform .65s ease;
    }
    .reveal.visible{opacity:1;filter:blur(0);transform:translateY(0)}
    .d1{transition-delay:.08s}
    .d2{transition-delay:.16s}
    .d3{transition-delay:.24s}

    /* ================= DESKTOP ================= */
    @media (min-width:1024px){
      /* desktop header */
      .nav-desktop{display:flex}
      .cta-top{display:flex}
      .menuBtn{display:none}
      .nav-mobile{display:none}
      .overlay{display:none}

      .hero{
        background:url("assets/FUNDO%20DESKTOP.webp") center/cover no-repeat;
        min-height:auto;           /* tira “buraco” */
      }

      .hero-wrap{
        grid-template-areas:"text media";
        grid-template-columns:0.95fr 1.05fr;
        align-items:start;
        gap:42px;
        padding:34px 18px 8px;     /* SEM espaço gigante embaixo */
      }

      .text{margin-top:18px;}      /* título na altura da cabeça */
      .media{margin-left:auto;margin-right:0;max-width:520px}
      .handle{
        bottom:var(--handle-bottom-desktop);
        width:340px;
      }
      .title{font-size:56px}
    }
  </style>
</head>

<body>

<header>
  <div class="header-inner">
    <a class="logo" href="#inicio" aria-label="Início">
      <img src="assets/LOGO.svg" alt="Logo">
    </a>

    <nav class="nav-desktop" aria-label="Menu principal">
      <a href="#inicio">Início</a>
      <a href="#quem-sou">Quem sou</a>
      <a href="#procedimentos">Procedimentos</a>
      <a href="#contato">Contato</a>
    </nav>

    <!-- só aparece no desktop -->
    <a class="cta-top" target="_blank" rel="noopener"
       href="https://wa.me/5544991212969?text=Ol%C3%A1!%20Quero%20agendar%20uma%20avalia%C3%A7%C3%A3o.">
      Agendar
    </a>

    <!-- mobile menu -->
    <button class="menuBtn" id="menuBtn" aria-label="Abrir menu" aria-expanded="false" type="button">
      <img src="assets/CLICAVEL.svg" alt="">
    </button>
  </div>
</header>

<nav class="nav-mobile" id="navMobile" aria-label="Menu mobile">
  <a href="#inicio">Início</a>
  <a href="#quem-sou">Quem sou</a>
  <a href="#procedimentos">Procedimentos</a>
  <a href="#contato">Contato</a>
  <a class="wa" target="_blank" rel="noopener"
     href="https://wa.me/5544991212969?text=Ol%C3%A1!%20Quero%20agendar%20uma%20avalia%C3%A7%C3%A3o.">
    WhatsApp — Quero agendar
  </a>
</nav>
<div class="overlay" id="overlay"></div>

<section class="hero" id="inicio">
  <div class="hero-wrap">
    <!-- FOTO (sempre em cima no mobile) -->
    <div class="media reveal d1">
      <img src="assets/DOUTORA%20MOBILE.webp" class="doutora" alt="Dra. Márcia Arduini">
      <img src="assets/@dramarcia.arduini.svg" class="handle" alt="@dramarcia.arduini">
    </div>

    <!-- TEXTO -->
    <div class="text">
      <h1 class="title reveal d1">
        PRECISÃO TÉCNICA
        SENSIBILIDADE ESTÉTICA.
      </h1>

      <p class="subtitle reveal d2">
        Harmonização facial e estética avançada com foco em naturalidade, segurança e
        planejamento individual.
      </p>

      <a class="cta reveal d3" target="_blank" rel="noopener"
         href="https://wa.me/5544991212969?text=Ol%C3%A1!%20Quero%20agendar%20uma%20avalia%C3%A7%C3%A3o.">
        Quero agendar
      </a>
    </div>
  </div>
</section>

<script>
  // menu mobile
  const btn = document.getElementById("menuBtn");
  const nav = document.getElementById("navMobile");
  const overlay = document.getElementById("overlay");

  function closeMenu(){
    nav.classList.remove("open");
    overlay.classList.remove("show");
    btn.setAttribute("aria-expanded","false");
  }

  btn.addEventListener("click", () => {
    const willOpen = !nav.classList.contains("open");
    nav.classList.toggle("open");
    overlay.classList.toggle("show");
    btn.setAttribute("aria-expanded", willOpen ? "true" : "false");
  });

  overlay.addEventListener("click", closeMenu);
  nav.querySelectorAll("a").forEach(a => a.addEventListener("click", closeMenu));

  // fade in + blur
  const els = document.querySelectorAll(".reveal");
  const io = new IntersectionObserver((entries)=>{
    entries.forEach(e=>{
      if(e.isIntersecting){
        e.target.classList.add("visible");
        io.unobserve(e.target);
      }
    });
  },{threshold:0.25});
  els.forEach(el=>io.observe(el));
</script>

</body>
</html>
