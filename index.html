<!doctype html>
<html lang="pt-br">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dra. Márcia Arduini</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@300;400&display=swap" rel="stylesheet">

<style>
:root{
  --title:"Cormorant Garamond", serif;
  --body:"Source Sans 3", sans-serif;
  --paper:#E7E3DC;
  --cta:#3B4E57;
  --header-h:104px;
}

*{box-sizing:border-box}
body{
  margin:0;
  font-family:var(--body);
  background:#fff;
  color:#111;
}
img{max-width:100%;display:block}
a{text-decoration:none;color:inherit}

/* ================= HEADER ================= */

header{
  position:fixed;
  top:0; left:0; right:0;
  height:var(--header-h);
  background:var(--paper);
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 20px;
  z-index:999;
  border-bottom:1px solid rgba(0,0,0,.06);
}

header img.logo{height:64px}

.menu-btn{
  width:56px;
  height:56px;
  border-radius:18px;
  border:1px solid rgba(0,0,0,.1);
  background:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
}

/* ================= HERO ================= */

.hero{
  padding-top:var(--header-h);
  min-height:100vh;
  position:relative;
  overflow:hidden;
}

.hero-bg{
  position:absolute;
  inset:0;
  background:url("assets/FUNDO%20MOBILE.webp") center/cover no-repeat;
  filter:blur(2px);
  transform:scale(1.05);
  z-index:0;
}

.hero-content{
  position:relative;
  z-index:2;
  padding:0 28px 60px 28px;
}

/* BLOCO IMAGEM */
.image-wrap{
  position:relative;
  max-width:390px;
  margin:0 auto;
}

/* DOUTORA */
.image-wrap img.doutora{
  width:100%;
  animation:floaty 4s ease-in-out infinite;
  filter:drop-shadow(0 20px 30px rgba(0,0,0,.22));
}

@keyframes floaty{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-8px)}
}

/* @ POSICIONADO NO QUADRIL */
.image-wrap img.handle{
  position:absolute;
  bottom:32%;   /* AJUSTE FINO DO QUADRIL */
  left:50%;
  transform:translateX(-50%);
  width:290px;
  filter:drop-shadow(0 18px 28px rgba(0,0,0,.18));
}

/* ================= TEXTO ================= */

.text-block{
  margin-top:30px;
  max-width:520px;
}

.text-block h1{
  font-family:var(--title);
  font-weight:700;
  font-size:46px;
  line-height:1.05;
  letter-spacing:.02em;
  text-transform:uppercase;
  margin:0;
  text-align:left;
}

.text-block p{
  margin-top:20px;
  font-size:18px;
  line-height:1.75;
  color:rgba(0,0,0,.6);
  text-align:left;
}

/* ================= BOTÃO ================= */

.cta{
  margin-top:35px;
  position:relative;
  overflow:hidden;
  height:64px;
  width:100%;
  border-radius:18px;
  background:var(--cta);
  color:#fff;
  font-size:20px;
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:0 12px 25px rgba(0,0,0,.18);
  transition:.2s ease;
}

.cta::after{
  content:"";
  position:absolute;
  top:-40%;
  left:-60%;
  width:50%;
  height:180%;
  background:linear-gradient(90deg,
    rgba(255,255,255,0),
    rgba(255,255,255,.4),
    rgba(255,255,255,0)
  );
  transform:skewX(-20deg);
  opacity:0;
}

.cta:hover{
  transform:translateY(-2px);
}

.cta:hover::after{
  opacity:1;
  animation:light 1.2s ease-in-out;
}

@keyframes light{
  0%{left:-60%}
  100%{left:140%}
}

/* ================= ANIMAÇÃO FADE ================= */

.reveal{
  opacity:0;
  filter:blur(10px);
  transform:translateY(20px);
  transition:.6s ease;
}
.reveal.visible{
  opacity:1;
  filter:blur(0);
  transform:translateY(0);
}
</style>
</head>

<body>

<header>
  <img src="assets/LOGO.svg" class="logo">
  <div class="menu-btn">
    <img src="assets/CLICAVEL.svg" width="22">
  </div>
</header>

<section class="hero" id="inicio">

  <div class="hero-bg"></div>

  <div class="hero-content">

    <div class="image-wrap">
      <img src="assets/DOUTORA%20MOBILE.webp" class="doutora">
      <img src="assets/@dramarcia.arduini.svg" class="handle">
    </div>

    <div class="text-block">
      <h1 class="reveal">
        PRECISÃO<br>
        TÉCNICA.<br>
        SENSIBILIDADE<br>
        ESTÉTICA.
      </h1>

      <p class="reveal">
        Harmonização facial e estética<br>
        avançada<br><br>
        com foco em naturalidade, segurança e<br>
        planejamento individual.
      </p>

      <a href="https://wa.me/5544991212969"
         target="_blank"
         class="cta reveal">
         Quero agendar
      </a>
    </div>

  </div>
</section>

<script>
const elements=document.querySelectorAll(".reveal");
const obs=new IntersectionObserver(entries=>{
  entries.forEach(entry=>{
    if(entry.isIntersecting){
      entry.target.classList.add("visible");
    }
  });
});
elements.forEach(el=>obs.observe(el));
</script>

</body>
</html>
