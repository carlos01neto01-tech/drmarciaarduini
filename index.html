<!doctype html>
<html lang="pt-br">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dra. Márcia Arduini</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@300;400&display=swap" rel="stylesheet">

<style>
:root{
  --title:"Cormorant Garamond", serif;
  --body:"Source Sans 3", sans-serif;
  --paper:#E7E3DC;
  --cta:#3B4E57;
  --header-h:100px;
}

*{box-sizing:border-box}
body{
  margin:0;
  font-family:var(--body);
  background:#fff;
  color:#111;
}

/* ================= HEADER ================= */

header{
  position:fixed;
  top:0;
  left:0;
  right:0;
  height:var(--header-h);
  background:var(--paper);
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 20px;
  z-index:999;
  border-bottom:1px solid rgba(0,0,0,.05);
}

header img.logo{
  height:60px;
}

.menu-btn{
  width:52px;
  height:52px;
  border-radius:16px;
  background:#fff;
  border:1px solid rgba(0,0,0,.1);
  display:flex;
  align-items:center;
  justify-content:center;
}

/* ================= HERO ================= */

.hero{
  padding-top:var(--header-h);
  min-height:100vh;
  position:relative;
  overflow:hidden;
}

/* Fundo */
.hero-bg{
  position:absolute;
  inset:0;
  background:url("assets/FUNDO%20MOBILE.webp") center/cover no-repeat;
  filter:blur(2px);
  transform:scale(1.05);
  z-index:0;
}

/* Conteúdo */
.hero-content{
  position:relative;
  z-index:2;
  padding:0 28px 60px 28px;
}

/* Doutora */
.hero img.doutora{
  width:100%;
  max-width:390px;
  display:block;
  margin:0 auto;
  margin-bottom:-120px;
  filter:drop-shadow(0 20px 30px rgba(0,0,0,.2));
}

/* @ */
<div style="display:flex; justify-content:center;">
  <img src="assets/@dramarcia.arduini.svg" class="handle">
</div>

/* BLOCO TEXTO */
.text-block{
  margin-top:10px;
}

/* TÍTULO */
.text-block h1{
  font-family:var(--title);
  font-weight:700;
  font-size:46px;
  line-height:1.05;
  letter-spacing:.02em;
  margin:0;
}

/* SUBTÍTULO */
.text-block p{
  margin-top:20px;
  font-size:18px;
  line-height:1.75;
  color:rgba(0,0,0,.6);
}

/* BOTÃO */
.cta{
  margin-top:35px;
  height:64px;
  width:100%;
  border-radius:18px;
  background:var(--cta);
  color:#fff;
  font-size:20px;
  display:flex;
  align-items:center;
  justify-content:center;
  text-decoration:none;
  box-shadow:0 10px 20px rgba(0,0,0,.15);
}

/* ================= ANIMAÇÃO ================= */

.reveal{
  opacity:0;
  filter:blur(10px);
  transform:translateY(20px);
  transition:all .6s ease;
}

.reveal.visible{
  opacity:1;
  filter:blur(0);
  transform:translateY(0);
}
</style>
</head>

<body>

<header>
  <img src="assets/LOGO.svg" class="logo">
  <div class="menu-btn">
    <img src="assets/CLICAVEL.svg" width="22">
  </div>
</header>

<section class="hero">

  <div class="hero-bg"></div>

  <div class="hero-content">

    <img src="assets/DOUTORA%20MOBILE.webp" class="doutora">

    <img src="assets/@dramarcia.arduini.svg" class="handle reveal">

    <div class="text-block">
      <h1 class="reveal">
        PRECISÃO<br>
        TÉCNICA.<br>
        SENSIBILIDADE<br>
        ESTÉTICA.
      </h1>

      <p class="reveal">
        Harmonização facial e estética
        avançada com foco em naturalidade, segurançae
        planejamento individual.
      </p>

      <a href="https://wa.me/5544991212969" target="_blank" class="cta reveal">
        Quero agendar
      </a>
    </div>

  </div>
</section>

<script>
const elements = document.querySelectorAll(".reveal");

const observer = new IntersectionObserver(entries=>{
  entries.forEach(entry=>{
    if(entry.isIntersecting){
      entry.target.classList.add("visible");
    }
  });
});

elements.forEach(el=>observer.observe(el));
</script>

</body>
</html>
